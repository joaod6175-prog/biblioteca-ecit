<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biblioteca ECIT João Da Matta</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet" />
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root { --navy: #1a2340; --gold: #c9993a; --cream: #faf6ee; --ink: #1a1a2e; }
    body { font-family: 'Crimson Pro', serif; background: var(--cream); color: var(--ink); margin: 0; }
    header { background: var(--navy); padding: 20px; color: white; text-align: center; border-bottom: 3px solid var(--gold); }
    nav { background: var(--navy); display: flex; justify-content: center; gap: 15px; padding: 10px; border-bottom: 1px solid var(--gold); }
    .tab { color: rgba(255,255,255,0.7); cursor: pointer; padding: 10px; font-weight: bold; }
    .tab.active { color: #e8c36a; border-bottom: 2px solid #c9993a; }
    main { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
    .section { display: none; }
    .section.active { display: block; }
    .book-card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 15px; border-top: 4px solid var(--gold); }
    .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    .btn-gold { background: var(--gold); color: white; width: 100%; }
    input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--navy); color: white; padding: 15px 25px; border-radius: 8px; display: none; z-index: 100; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
  </style>
</head>
<body>

<header>
  <h1>ECIT João Da Matta</h1>
  <p>Sistema de Biblioteca - Mamanguape</p>
</header>

<nav>
  <div id="tab-acervo" class="tab active" onclick="showTab('acervo', this)">📖 Acervo</div>
  <div id="tab-admin" class="tab" onclick="acessoAdmin(this)">⚙️ Admin</div>
</nav>

<main>
  <section id="acervo" class="section active">
    <h2>Livros Disponíveis</h2>
    <div id="bookGrid">Carregando livros...</div>
  </section>

  <section id="admin" class="section">
    <div style="background:white; padding:20px; border-radius:10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
      <h2>🔐 Painel Administrativo</h2>
      <hr>
      <h3>Adicionar Novo Livro</h3>
      <input type="text" id="adTitulo" placeholder="Título do Livro">
      <input type="text" id="adAutor" placeholder="Autor">
      <select id="adCat">
        <option>Literatura</option><option>História</option><option>Ciências</option><option>Didático</option>
      </select>
      <input type="number" id="adQtd" value="1" placeholder="Quantidade Total">
      <button class="btn btn-gold" onclick="cadastrarLivro()">Salvar no Supabase</button>
      <p style="text-align:center; margin-top:20px;"><button onclick="sairAdmin()" style="background:none; border:none; color:red; cursor:pointer; text-decoration:underline;">Sair do Modo Admin</button></p>
    </div>
  </section>
</main>

<div id="toast" class="toast"></div>

<script>
// CONFIGURAÇÃO SUPABASE
const SUPABASE_URL = 'https://lvverofpxhfpwpzueqxf.supabase.co';
const SUPABASE_KEY = 'sb_publishable_A-dN4r3iX3q-kqywELQAug_xeTqxbmK';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// FUNÇÃO DE SENHA
function acessoAdmin(el) {
  const senhaInformada = prompt("Digite a senha de administrador:");
  const SENHA_CORRETA = "bibliotecaecitmme";

  if (senhaInformada === SENHA_CORRETA) {
    showTab('admin', el);
    toast("Acesso autorizado!");
  } else {
    alert("Senha incorreta! Acesso negado.");
    // Mantém na aba acervo
    showTab('acervo', document.getElementById('tab-acervo'));
  }
}

function sairAdmin() {
    showTab('acervo', document.getElementById('tab-acervo'));
    toast("Você saiu do modo admin.");
}

function showTab(id, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  el.classList.add('active');
  if(id === 'acervo') loadBooks();
}

async function loadBooks() {
  const grid = document.getElementById('bookGrid');
  try {
    const { data, error } = await db.from('livros').select('*').order('title');
    if (error) throw error;
    
    if (data.length === 0) {
      grid.innerHTML = "<p>Nenhum livro cadastrado no sistema.</p>";
      return;
    }

    grid.innerHTML = data.map(b => `
      <div class="book-card">
        <h3>📘 ${b.title}</h3>
        <p><strong>Autor:</strong> ${b.author} | <strong>Categoria:</strong> ${b.cat}</p>
        <p>Disponível: <span style="color:${b.available > 0 ? 'green' : 'red'}">${b.available} de ${b.total}</span></p>
      </div>
    `).join('');
  } catch (err) {
    grid.innerHTML = "Erro ao conectar com o banco de dados.";
    console.error(err);
  }
}

async function cadastrarLivro() {
  const title = document.getElementById('adTitulo').value;
  const author = document.getElementById('adAutor').value;
  const cat = document.getElementById('adCat').value;
  const qtd = parseInt(document.getElementById('adQtd').value);

  if(!title || !author) return toast("⚠️ Preencha o título e o autor!");

  try {
    const { error } = await db.from('livros').insert([{ 
      title, author, cat, total: qtd, available: qtd 
    }]);
    
    if (error) throw error;
    
    toast("✅ Livro cadastrado com sucesso!");
    // Limpa os campos
    document.getElementById('adTitulo').value = '';
    document.getElementById('adAutor').value = '';
  } catch (err) {
    toast("❌ Erro ao salvar no banco.");
    console.error(err);
  }
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

// Inicia o sistema
loadBooks();
</script>
</body>
</html>
