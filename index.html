<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sistema de Biblioteca ECIT João Da Matta - Mamanguape" />
  <title>Biblioteca ECIT João Da Matta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet" />
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* O CSS permanece o mesmo do original para manter o design elegante */
    :root {
      --navy: #1a2340; --navy2: #2a3a6a; --gold: #c9993a; --gold-light: #e8c36a;
      --green: #2a7a3b; --green2: #1f5e2c; --red: #8b2020; --red2: #6e1818;
      --teal: #1a6b6b; --cream: #faf6ee; --ink: #1a1a2e; --shadow: rgba(26,35,64,.18);
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Crimson Pro', serif; background: var(--cream); color: var(--ink); min-height: 100vh; }
    header { background: var(--navy); padding: 20px; color: white; text-align: center; border-bottom: 3px solid var(--gold); }
    header h1 { font-family: 'Playfair Display', serif; color: var(--gold-light); }
    nav { background: var(--navy); display: flex; justify-content: center; overflow-x: auto; border-bottom: 1px solid var(--gold); }
    .tab { padding: 15px 20px; color: rgba(255,255,255,0.7); cursor: pointer; white-space: nowrap; }
    .tab.active { color: var(--gold-light); border-bottom: 3px solid var(--gold); background: rgba(255,255,255,0.1); }
    main { max-width: 1100px; margin: 0 auto; padding: 20px; }
    .section { display: none; }
    .section.active { display: block; }
    .hero { background: var(--navy2); padding: 30px; border-radius: 12px; color: white; margin-bottom: 20px; }
    .search-row { display: flex; gap: 10px; margin-top: 15px; }
    .search-row input { flex: 1; padding: 10px; border-radius: 5px; border: none; }
    .grid-3 { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .book-card { background: white; border-radius: 10px; padding: 15px; box-shadow: 0 4px 10px var(--shadow); border-top: 5px solid var(--gold); }
    .tag { font-size: 0.8rem; padding: 3px 8px; border-radius: 5px; }
    .tag-avail { background: #d4edda; color: #155724; }
    .tag-unavail { background: #f8d7da; color: #721c24; }
    .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    .btn-gold { background: var(--gold); color: var(--navy); }
    .btn-green { background: var(--green); color: white; }
    .form-card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px var(--shadow); }
    .field { margin-bottom: 15px; }
    .field label { display: block; margin-bottom: 5px; font-weight: bold; }
    .field input, .field select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
    table { width: 100%; border-collapse: collapse; background: white; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
    th { background: var(--navy); color: white; }
    .toast { position: fixed; bottom: 20px; right: 20px; background: var(--navy); color: white; padding: 15px; border-radius: 8px; display: none; }
  </style>
</head>
<body>

<header>
  <h1>ECIT João Da Matta</h1>
  <p>Mamanguape - PB | Sistema de Biblioteca</p>
</header>

<nav>
  <div class="tab active" onclick="showTab('acervo', this)">📖 Acervo</div>
  <div class="tab" onclick="showTab('emprestimo', this)">📋 Empréstimo</div>
  <div class="tab" onclick="showTab('devolucao', this)">↩️ Devolução</div>
  <div class="tab" onclick="showTab('historico', this)">🕐 Histórico</div>
  <div class="tab" onclick="showTab('admin', this)">⚙️ Admin</div>
</nav>

<main>
  <section id="acervo" class="section active">
    <div class="hero">
      <h2>O que você quer ler hoje?</h2>
      <div class="search-row">
        <input type="text" id="searchInput" placeholder="Título ou autor..." oninput="filterBooks()">
      </div>
    </div>
    <div class="grid-3" id="bookGrid">Carregando acervo...</div>
  </section>

  <section id="emprestimo" class="section">
    <div class="form-card">
      <h2>Novo Empréstimo</h2>
      <div class="field"><label>Nome do Aluno</label><input type="text" id="empNome"></div>
      <div class="field"><label>Matrícula</label><input type="text" id="empMatricula"></div>
      <div class="field"><label>Livro</label><select id="empLivro"></select></div>
      <div class="field"><label>Devolução</label><input type="date" id="empData"></div>
      <button class="btn btn-gold" onclick="registrarEmprestimo()">Confirmar</button>
    </div>
  </section>

  <section id="devolucao" class="section">
    <table id="devTable">
      <thead><tr><th>Aluno</th><th>Livro</th><th>Prazo</th><th>Ação</th></tr></thead>
      <tbody id="devBody"></tbody>
    </table>
  </section>

  <section id="historico" class="section">
    <table id="histTable">
      <thead><tr><th>Aluno</th><th>Livro</th><th>Data Saída</th><th>Status</th></tr></thead>
      <tbody id="histBody"></tbody>
    </table>
  </section>

  <section id="admin" class="section">
    <div class="form-card">
      <h2>Adicionar Livro</h2>
      <div class="field"><label>Título</label><input type="text" id="adTitulo"></div>
      <div class="field"><label>Autor</label><input type="text" id="adAutor"></div>
      <div class="field"><label>Categoria</label><select id="adCat">
        <option>Literatura</option><option>Ciências</option><option>História</option><option>Tecnologia</option>
      </select></div>
      <div class="field"><label>Quantidade</label><input type="number" id="adQtd" value="1"></div>
      <button class="btn btn-gold" onclick="cadastrarLivro()">Salvar no Banco</button>
    </div>
  </section>
</main>

<div id="toast" class="toast"></div>

<script>
// CONFIGURAÇÃO SUPABASE - COLOQUE SEUS DADOS AQUI!
const SUPABASE_URL = 'https://lvverofpxhfpwpzueqxf.supabase.co/rest/v1/';
const SUPABASE_KEY = 'sb_publishable_A-dN4r3iX3q-kqywELQAug_xeTqxbmK';
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let allBooks = [];

// NAVEGAÇÃO
function showTab(id, el) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  el.classList.add('active');
  if(id === 'acervo') loadBooks();
  if(id === 'emprestimo') populateSelect();
  if(id === 'devolucao') loadActiveLoans();
  if(id === 'historico') loadHistory();
}

// CARREGAR LIVROS
async function loadBooks() {
  const { data, error } = await supabase.from('livros').select('*').order('title');
  if (error) return console.error(error);
  allBooks = data;
  renderBooks(data);
}

function renderBooks(list) {
  const grid = document.getElementById('bookGrid');
  grid.innerHTML = list.map(b => `
    <div class="book-card">
      <div style="font-size:40px">${b.emoji || '📘'}</div>
      <h3>${b.title}</h3>
      <p>${b.author}</p>
      <span class="tag ${b.available > 0 ? 'tag-avail' : 'tag-unavail'}">
        ${b.available > 0 ? b.available + ' disponíveis' : 'Esgotado'}
      </span>
    </div>
  `).join('');
}

// CADASTRAR LIVRO
async function cadastrarLivro() {
  const title = document.getElementById('adTitulo').value;
  const author = document.getElementById('adAutor').value;
  const cat = document.getElementById('adCat').value;
  const qtd = parseInt(document.getElementById('adQtd').value);

  const { error } = await supabase.from('livros').insert([{ 
    title, author, cat, total: qtd, available: qtd 
  }]);

  if (!error) {
    toast("✅ Livro salvo no Supabase!");
    loadBooks();
  }
}

// EMPRÉSTIMO
async function populateSelect() {
  const { data } = await supabase.from('livros').select('id, title').gt('available', 0);
  const sel = document.getElementById('empLivro');
  sel.innerHTML = data.map(b => `<option value="${b.id}">${b.title}</option>`).join('');
}

async function registrarEmprestimo() {
  const name = document.getElementById('empNome').value;
  const book_id = document.getElementById('empLivro').value;
  const date_due = document.getElementById('empData').value;
  const book_title = document.getElementById('empLivro').options[document.getElementById('empLivro').selectedIndex].text;

  // 1. Criar empréstimo
  const { error: err1 } = await supabase.from('emprestimos').insert([{
    name, book_id, date_due, book_title, matricula: document.getElementById('empMatricula').value, turma: 'Geral'
  }]);

  // 2. Diminuir estoque
  const book = allBooks.find(b => b.id === book_id);
  await supabase.from('livros').update({ available: book.available - 1 }).eq('id', book_id);

  if (!err1) toast("✅ Empréstimo registrado!");
}

// DEVOLUÇÃO
async function loadActiveLoans() {
  const { data } = await supabase.from('emprestimos').select('*').eq('returned', false);
  const body = document.getElementById('devBody');
  body.innerHTML = data.map(l => `
    <tr>
      <td>${l.name}</td>
      <td>${l.book_title}</td>
      <td>${l.date_due}</td>
      <td><button class="btn btn-green" onclick="devolver('${l.id}', '${l.book_id}')">Devolver</button></td>
    </tr>
  `).join('');
}

async function devolver(loanId, bookId) {
  // 1. Marcar como devolvido
  await supabase.from('emprestimos').update({ returned: true, date_returned: new Date() }).eq('id', loanId);
  
  // 2. Aumentar estoque
  const { data: book } = await supabase.from('livros').select('available').eq('id', bookId).single();
  await supabase.from('livros').update({ available: book.available + 1 }).eq('id', bookId);

  toast("📚 Livro devolvido!");
  loadActiveLoans();
}

// HISTÓRICO
async function loadHistory() {
  const { data } = await supabase.from('emprestimos').select('*').order('created_at', { ascending: false });
  document.getElementById('histBody').innerHTML = data.map(l => `
    <tr>
      <td>${l.name}</td>
      <td>${l.book_title}</td>
      <td>${new Date(l.date_out).toLocaleDateString()}</td>
      <td>${l.returned ? '✅ Devolvido' : '📖 Pendente'}</td>
    </tr>
  `).join('');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

function filterBooks() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  renderBooks(allBooks.filter(b => b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q)));
}

// Início
loadBooks();
</script>
</body>
</html>
