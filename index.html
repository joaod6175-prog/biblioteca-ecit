    .btn-gold { background: var(--gold); }
    .btn-del { background: var(--red); width: auto; padding: 5px 10px; font-size: 12px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--navy); color: white; padding: 10px 20px; border-radius: 20px; display: none; z-index: 9999; }
  </style>
</head>

let allBooks = [];

async function loadBooks() {
  const { data, error } = await db.from('livros').select('*').order('title');
  if (error) return console.error(error);
  allBooks = data;
  renderBooks(data);
}

function renderBooks(list) {
  const grid = document.getElementById('bookGrid');
  grid.innerHTML = list.map(b => `
    <div class="card">
      <strong>${b.title}</strong><br>
      <small>${b.author}</small><br>
      <small>Disponível: ${b.available}/${b.total}</small>
    </div>
  `).join('') || "Nenhum livro encontrado.";
}

function filterBooks() {
  const t = document.getElementById('searchInp').value.toLowerCase();
  renderBooks(allBooks.filter(b => b.title.toLowerCase().includes(t) || b.author.toLowerCase().includes(t)));
}
